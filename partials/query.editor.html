<query-editor-row query-ctrl="ctrl" can-collapse="false">
  <div class="tight-form">
    <ul class="tight-form-list">
      <li class="tight-form-item">Item</li>
      <li>
        <input type="text" class="input-xxlarge tight-form-input" ng-model="ctrl.target.item"
               spellcheck='false' placeholder="select item" ng-blur="ctrl.onChangeInternal()">
      </li>
      <li class="tight-form-item">Property</li>
      <li>
        <input type="text" class="input-xxlarge tight-form-input" ng-model="ctrl.target.property"
               spellcheck='false' placeholder="select property" ng-blur="ctrl.onChangeInternal()">
      </li>
      <li class="tight-form-item">Scale</li>
      <li>
        <input type="text" class="input-small tight-form-input" ng-model="ctrl.target.scale"
               spellcheck='false' placeholder="select scaling factor" ng-blur="ctrl.onChangeInternal()">
      </li>
    </ul>
    <div class="clearfix"></div>
  </div>
</query-editor-row>
